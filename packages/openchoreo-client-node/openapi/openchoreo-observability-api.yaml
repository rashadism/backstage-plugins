openapi: 3.0.3
info:
  title: OpenChoreo Observer API
  description: |
    The OpenChoreo Observer API provides endpoints for querying logs,
    traces, and metrics from namespaces for components, projects, and environments,
    as well as logs from workflows.
    It integrates with separate observability modules to fetch the actual data via
    API calls to the adaptors provided by the modules.
  version: 1.0.0
  contact:
    name: OpenChoreo Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Logs
    description: Log retrieval endpoints
  - name: Health
    description: Health check endpoints

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check the health status of the observer service.
      operationId: health
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy
                  error:
                    type: string
                    example: 'opensearch: connection failed'

  # Logs query endpoint
  /api/v1/logs/query:
    post:
      tags:
        - Logs
      summary: Query logs
      description: Query logs from the observer service
      operationId: queryLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogsQueryRequest'
      responses:
        '200':
          description: Logs queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'badRequest'
                errorCode: ''
                message: "Missing required fields 'startTime' and 'endTime'"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'unauthorized'
                errorCode: ''
                message: 'Invalid or missing token'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'forbidden'
                errorCode: ''
                message: 'Subject <xyz> has no permission to view logs of Namespace foo, Project bar, Component baz in Environment development'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'internalServerError'
                errorCode: 'OBS-V1-L-29'
                message: ''

  # Metrics query endpoint
  /api/v1/metrics/query:
    post:
      tags:
        - Metrics
      summary: Query metrics
      description: Query metrics from the observer service
      operationId: queryMetrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricsQueryRequest'
      responses:
        '200':
          description: Metrics queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Traces query endpoints
  /api/v1alpha1/traces/query:
    post:
      tags:
        - Traces
      summary: Query traces
      description: Query traces from the observer service
      operationId: queryTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TracesQueryRequest'
      responses:
        '200':
          description: Traces queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TracesQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1alpha1/traces/{traceId}/spans/query:
    post:
      tags:
        - Traces
      summary: Query spans for a trace
      description: Query spans for a trace from the observer service
      operationId: querySpansForTrace
      parameters:
        - name: traceId
          in: path
          required: true
          description: The ID of the trace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TracesQueryRequest'
      responses:
        '200':
          description: Spans queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceSpansQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1alpha1/traces/{traceId}/spans/{spanId}:
    get:
      tags:
        - Traces
      summary: Get details of a span for a trace
      description: Get details of a span for a trace from the observer service
      operationId: getSpanDetailsForTrace
      parameters:
        - name: traceId
          in: path
          required: true
          description: The ID of the trace
          schema:
            type: string
        - name: spanId
          in: path
          required: true
          description: The ID of the span
          schema:
            type: string
      responses:
        '200':
          description: Span details queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceSpanDetailsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Incidents query endpoint
  /api/v1alpha1/incidents/query:
    post:
      tags:
        - Incidents
      summary: Query incidents
      description: Query incidents from the observer service
      operationId: queryIncidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentsQueryRequest'
      responses:
        '200':
          description: Incidents queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentsQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Triggered alerts query endpoint
  /api/v1alpha1/alerts/query:
    post:
      tags:
        - Alerts
      summary: Query alerts
      description: Query alerts from the observer service
      operationId: queryAlerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertsQueryRequest'
      responses:
        '200':
          description: Alerts queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # Request schemas for logs
    ComponentSearchScope:
      type: object
      properties:
        namespace:
          type: string
        project:
          type: string
        component:
          type: string
        environment:
          type: string
      required: [namespace]

    WorkflowSearchScope:
      type: object
      properties:
        namespace:
          type: string
        workflowRunName:
          type: string
      required: [namespace]

    LogsQueryRequest:
      type: object
      properties:
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        limit:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
          description: The maximum number of items to return
        sortOrder:
          type: string
          description: The sort order of the query
          enum:
            - asc
            - desc
          default: desc
        searchScope:
          oneOf:
            - $ref: '#/components/schemas/ComponentSearchScope'
            - $ref: '#/components/schemas/WorkflowSearchScope'
        logLevels:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: ['DEBUG', 'INFO', 'WARN', 'ERROR']
        searchPhrase:
          type: string
      required: [startTime, endTime, searchScope]

    # Response schemas for logs
    ComponentLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          description: The timestamp of the log entry
          format: date-time
        log:
          type: string
          description: The log message
        level:
          type: string
          description: The log level
        metadata:
          type: object
          description: The metadata of the log entry
          properties:
            componentName:
              type: string
              description: The OpenChoreo component name that generated the log
            projectName:
              type: string
              description: The OpenChoreo project name that generated the log
            environmentName:
              type: string
              description: The OpenChoreo environment name that generated the log
            namespaceName:
              type: string
              description: The OpenChoreo namespace name that generated the log
            componentUid:
              type: string
              description: The OpenChoreo component UID that generated the log
              format: uuid
            projectUid:
              type: string
              description: The OpenChoreo project UID that generated the log
              format: uuid
            environmentUid:
              type: string
              description: The OpenChoreo environment UID that generated the log
              format: uuid
            containerName:
              type: string
              description: The container name that generated the log
            podName:
              type: string
              description: The Kubernetes pod name that generated the log
            podNamespace:
              type: string
              description: The namespace of the Kubernetes pod that generated the log

    WorkflowLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          description: The timestamp of the log entry
          format: date-time
        log:
          type: string
          description: The log message
        metadata:
          type: object
          description: The metadata of the log entry

    LogsQueryResponse:
      type: object
      properties:
        logs:
          oneOf:
            - type: array
              items:
                $ref: '#/components/schemas/ComponentLogEntry'
            - type: array
              items:
                $ref: '#/components/schemas/WorkflowLogEntry'
          description: The logs queried successfully
        total:
          type: integer
          description: The total number of logs queried
        tookMs:
          type: integer
          description: The time taken to query the logs in milliseconds

    # Request schemas for metrics
    MetricsQueryRequest:
      type: object
      properties:
        metric:
          type: string
          description: The type of query to execute
          enum:
            - resource
            - http
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        step:
          type: string
          description: The step of the query to determine the number of points to return. E.g. 1m, 5m, 15m, 30m, 1h
        searchScope:
          $ref: '#/components/schemas/ComponentSearchScope'
      required: [metric, startTime, endTime, searchScope]

    # Response schemas for metrics
    MetricsTimeSeriesItem:
      type: object
      properties:
        timestamp:
          type: string
          description: The timestamp of the time series item
          format: date-time
        value:
          type: number
          format: double
          description: The value of the time series item

    ResourceMetricsTimeSeries:
      type: object
      properties:
        cpuUsage:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        cpuRequests:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        cpuLimits:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        memoryUsage:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        memoryRequests:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        memoryLimits:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'

    HttpMetricsTimeSeries:
      type: object
      properties:
        requestCount:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        successfulRequestCount:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        unsuccessfulRequestCount:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        meanLatency:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        latencyP50:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        latencyP90:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        latencyP99:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'

    MetricsQueryResponse:
      oneOf:
        - $ref: '#/components/schemas/ResourceMetricsTimeSeries'
        - $ref: '#/components/schemas/HttpMetricsTimeSeries'

    # Request schemas for traces
    TracesQueryRequest:
      type: object
      properties:
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        limit:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
          description: The maximum number of items to return
        sort:
          type: string
          description: The sort order of the query
          enum:
            - asc
            - desc
          default: desc
        searchScope:
          $ref: '#/components/schemas/ComponentSearchScope'
      required: [startTime, endTime, searchScope]

    # Response schemas for traces
    TracesQueryResponse:
      type: object
      properties:
        traces:
          type: array
          description: The list of traces
          items:
            type: object
            properties:
              traceId:
                type: string
                description: The trace ID
              traceName:
                type: string
                description: The name of the trace
              spanCount:
                type: integer
                description: The number of spans in the trace
              rootSpanId:
                type: string
              rootSpanName:
                type: string
              rootSpanKind:
                type: string
              startTime:
                type: string
                description: The start time of the trace
                format: date-time
              endTime:
                type: string
                description: The end time of the trace
                format: date-time
              durationNs:
                type: number
                description: The duration of the trace in nanoseconds
        total:
          type: integer
          description: The total number of traces
        tookMs:
          type: integer
          description: The time taken to query the traces in milliseconds

    TraceSpansQueryResponse:
      type: object
      properties:
        spans:
          type: array
          description: The list of spans
          items:
            type: object
            properties:
              spanId:
                type: string
                description: The span ID
              spanName:
                type: string
                description: The name of the span
              spanKind:
                type: string
                description: The name of the span
              startTime:
                type: string
                description: The start time of the span
                format: date-time
              endTime:
                type: string
                description: The end time of the span
                format: date-time
              durationNs:
                type: number
                description: The duration of the span in nanoseconds
              parentSpanId:
                type: string
                description: The parent span ID
        total:
          type: integer
          description: The total number of spans
        tookMs:
          type: integer
          description: The time taken to query the spans in milliseconds

    TraceSpanDetailsResponse:
      type: object
      properties:
        spanId:
          type: string
          description: The span ID
        spanName:
          type: string
          description: The name of the span
        startTime:
          type: string
          description: The start time of the span
          format: date-time
        endTime:
          type: string
          description: The end time of the span
          format: date-time
        durationNs:
          type: number
          description: The duration of the span in nanoseconds
        parentSpanId:
          type: string
          description: The parent span ID
        attributes:
          type: array
          items:
            type: object
            description: The attributes of the span
            properties:
              key:
                type: string
                description: The key of the attribute
              value:
                type: string
                description: The value of the attribute

    # Request schema for alerts query
    AlertsQueryRequest:
      type: object
      properties:
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        limit:
          type: integer
          description: The maximum number of items to return
          default: 100
          minimum: 1
          maximum: 1000
        sort:
          type: string
          description: The sort order of the query
          enum:
            - asc
            - desc
          default: desc
        searchScope:
          $ref: '#/components/schemas/ComponentSearchScope'
      required: [startTime, endTime, searchScope]

    # Response schema for alerts query
    AlertsQueryResponse:
      type: object
      properties:
        alerts:
          type: array
          description: The list of alerts
          items:
            type: object
            properties:
              timestamp:
                type: string
                description: The timestamp of the alert
                format: date-time
              alertId:
                type: string
                description: The alert ID
              alertValue:
                type: string
                description: The value of the alert
              notificationChannels:
                type: array
                description: The notification channels of the alert. Empty if failed to notify.
                items:
                  type: string
                  description: The name of the notification channel
              metadata:
                type: object
                properties:
                  alertRule:
                    type: object
                    properties:
                      name:
                        type: string
                        description: The name of the alert rule
                      description:
                        type: string
                        description: The description of the alert rule
                      severity:
                        type: string
                        description: The severity of the alert rule
                        enum:
                          - info
                          - warning
                          - critical
                      source:
                        type: object
                        description: The source configuration of the alert rule
                        properties:
                          type:
                            type: string
                            description: The type of the alert source
                            enum:
                              - log
                              - metric
                          query:
                            type: string
                            description: The query used for log-based alerts
                          metric:
                            type: string
                            description: The metric used for metric-based alerts
                      condition:
                        type: object
                        description: The condition configuration of the alert rule
                        properties:
                          operator:
                            type: string
                            description: The comparison operator used for evaluation
                            enum:
                              - gt
                              - lt
                              - gte
                              - lte
                              - eq
                          threshold:
                            type: integer
                            description: The threshold value that triggers the alert
                          window:
                            type: string
                            description: The time window for aggregation (e.g. "5m", "1h")
                          interval:
                            type: string
                            description: The evaluation interval (e.g. "1m", "5m")
                  labels:
                    type: object
                    properties:
                      componentName:
                        type: string
                        description: The name of the component
                      environmentName:
                        type: string
                        description: The name of the environment
                      projectName:
                        type: string
                        description: The name of the project
                      namespaceName:
                        type: string
                        description: The name of the namespace
                      componentUid:
                        type: string
                        description: The UID of the component
                        format: uuid
                      environmentUid:
                        type: string
                        description: The UID of the environment
                        format: uuid
                      projectUid:
                        type: string
                        description: The UID of the project
                        format: uuid
        total:
          type: integer
          description: The total number of alerts
        tookMs:
          type: integer
          description: The time taken to query the alerts in milliseconds

    # Request schema for incidents query
    IncidentsQueryRequest:
      type: object
      properties:
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        limit:
          type: integer
          description: The maximum number of items to return
          default: 100
          minimum: 1
          maximum: 1000
        sort:
          type: string
          description: The sort order of the query
          enum:
            - asc
            - desc
          default: desc
        searchScope:
          $ref: '#/components/schemas/ComponentSearchScope'
      required: [startTime, endTime, searchScope]

    # Response schema for incidents query
    IncidentsQueryResponse:
      type: object
      properties:
        incidents:
          type: array
          description: The list of incidents
          items:
            type: object
            properties:
              timestamp:
                type: string
                description: The timestamp of the incident
                format: date-time
              alertId:
                type: string
                description: The ID of the alert that triggered the incident
              incidentId:
                type: string
                description: The ID of the incident
              incidentTriggerAiRca:
                type: boolean
                description: Whether AI RCA was triggered for the incident
              status:
                type: string
                description: The status of the incident
                enum:
                  - triggered
                  - acknowledged
                  - resolved
              triggeredAt:
                type: string
                description: The timestamp when the incident was triggered
                format: date-time
              acknowledgedAt:
                type: string
                description: The timestamp when the incident was acknowledged
                format: date-time
              resolvedAt:
                type: string
                description: The timestamp when the incident was resolved
                format: date-time
              notes:
                type: string
                description: Notes associated with the incident
              description:
                type: string
                description: The description of the incident
              labels:
                type: object
                properties:
                  componentName:
                    type: string
                    description: The name of the component
                  environmentName:
                    type: string
                    description: The name of the environment
                  projectName:
                    type: string
                    description: The name of the project
                  namespaceName:
                    type: string
                    description: The name of the namespace
                  componentUid:
                    type: string
                    description: The UID of the component
                    format: uuid
                  environmentUid:
                    type: string
                    description: The UID of the environment
                    format: uuid
                  projectUid:
                    type: string
                    description: The UID of the project
                    format: uuid
        total:
          type: integer
          description: The total number of incidents
        tookMs:
          type: integer
          description: The time taken to query the incidents in milliseconds

    ErrorResponse:
      type: object
      required:
        - error
        - code
        - message
      properties:
        error:
          type: string
          description: Error type
          enum:
            - missingParameter
            - invalidRequest
            - internalError
          example: 'invalidRequest'
        code:
          type: string
          description: Error code
          example: 'OBS-L-12'
        message:
          type: string
          description: Human-readable error message
          example: 'Invalid request format'
